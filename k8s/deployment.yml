apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-app
  namespace: nginx  
  labels:
    app: notes-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notes-app
  template:
    metadata:
      labels:
        app: notes-app
    spec:
      containers:
      - name: notes-app
        image: atul8780/notes-app-k8s
        ports:
        - containerPort: 8000

